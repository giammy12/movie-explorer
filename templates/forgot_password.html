{% extends "base.html" %}

{% block title %}Password dimenticata - Giammy Streaming{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="auth-card">
        <span class="badge">Recupera accesso</span>
        <h1>Password dimenticata</h1>
        <p>Inserisci l'email del tuo account per ricevere il link di reset.</p>

        <form action="{{ url_for('forgot_password') }}" method="post" class="auth-form">
            <input type="email" name="email" placeholder="Email" required>
            <button type="submit" class="primary-btn">Invia link di reset</button>
        </form>

        <p class="auth-link">
            <a href="{{ url_for('login') }}">Torna al login</a>
        </p>
    </div>
</section>
{% endblock %}

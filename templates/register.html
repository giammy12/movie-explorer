{% extends "base.html" %}

{% block title %}Registrazione - Giammy Streaming{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="auth-card">

        <span class="badge">Crea il tuo account</span>

        <h1>Registrati</h1>

        <p>Compila i campi per creare un account personale</p>

        <form action="{{ url_for('register') }}" method="post" class="auth-form">

            <input type="text" name="first_name" placeholder="Nome" required>

            <input type="text" name="last_name" placeholder="Cognome" required>

            <input type="email" name="email" placeholder="Email" required>

            <input type="text" name="username" placeholder="Nome utente" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="primary-btn">Registrati</button>

        </form>

        <p class="auth-link">
            Hai già un account?
            <a href="{{ url_for('login') }}">Accedi</a>
        </p>

    </div>
</section>
{% endblock %}

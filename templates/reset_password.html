{% extends "base.html" %}

{% block title %}Nuova password - Giammy Streaming{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="auth-card">
        <span class="badge">Nuova password</span>
        <h1>Imposta una nuova password</h1>
        <p>Inserisci la tua nuova password rispettando le regole di sicurezza.</p>

        <form action="" method="post" class="auth-form">
            <input type="password" name="password" placeholder="Nuova password" required>
            <button type="submit" class="primary-btn">Aggiorna password</button>
        </form>

        <p class="auth-link">
            <a href="{{ url_for('login') }}">Torna al login</a>
        </p>
    </div>
</section>
{% endblock %}

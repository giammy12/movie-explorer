{% extends "base.html" %}

{% block title %}Verifica OTP - Giammy Streaming{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="auth-card">
        <span class="badge">Sicurezza account</span>
        <h1>Verifica OTP</h1>
        <p>Inserisci il codice OTP che hai ricevuto via email per cambiare password.</p>

        <form action="{{ url_for('verify_password_otp') }}" method="post" class="auth-form">
            <input type="text" name="otp_code" placeholder="Codice OTP" required>
            <button type="submit" class="primary-btn">Verifica codice</button>
        </form>
    </div>
</section>
{% endblock %}

{% extends "base.html" %}

{% block title %}{{ movie.title }} - Player{% endblock %}

{% block content %}
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

body {
    min-height: 100vh;
}

.player-page {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    z-index: 9999;
    margin: 0;
    padding: 0;
}

.player-card {
    width: 100%;
    height: 100%;
    max-width: none !important;
    margin: 0 !important;
    padding: 0 !important;
    border-radius: 0 !important;
    background: #000 !important;
    box-shadow: none !important;
    display: flex;
    flex-direction: column;
}

.player-top {
    display: none !important;
    pointer-events: none !important;
}

.player-top-actions {
    pointer-events: none !important;
}

.player-top a,
.player-top button,
.player-top [tabindex] {
    pointer-events: none !important;
    outline: none !important;
}

.player-frame-wrap {
    flex: 1;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

#provider-player {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
    outline: none !important;
}
</style>

<section class="player-page">
    <div class="section-card player-card">
        <div class="player-top" aria-hidden="true">
            <div>
                <span class="badge">In riproduzione</span>
                <h1>{{ movie.title }}</h1>
                <p class="player-subtitle">Il progresso viene salvato automaticamente.</p>
            </div>

            <div class="player-top-actions" aria-hidden="true">
                {% if is_tv %}
                    <a
                        href="{{ url_for('tv_detail', tv_id=movie_id, season=season, episode=episode) }}"
                        class="secondary-btn"
                        tabindex="-1"
                    >Dettagli</a>
                {% else %}
                    <a
                        href="{{ url_for('movie_detail', movie_id=movie_id) }}"
                        class="secondary-btn"
                        tabindex="-1"
                    >Dettagli</a>
                {% endif %}
                <a
                    href="{{ url_for('home') }}"
                    class="secondary-btn"
                    tabindex="-1"
                >Home</a>
            </div>
        </div>

        <div class="player-frame-wrap">
            <iframe
                id="provider-player"
                src="{{ player_url }}"
                title="Player di {{ movie.title }}"
                allow="autoplay; fullscreen"
                allowfullscreen
                referrerpolicy="origin"
                tabindex="0"
            ></iframe>
        </div>
    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const providerOrigin = "{{ provider_origin }}";
    const tmdbId = Number("{{ movie_id }}");
    const isTv = {{ "true" if is_tv else "false" }};
    const season = {{ season if season is not none else "null" }};
    const episode = {{ episode if episode is not none else "null" }};
    const iframe = document.getElementById("provider-player");

    let lastSentTime = 0;
    let latestCurrentTime = 0;
    let latestDuration = 0;
    let hasEnded = false;

    function focusPlayer() {
        if (iframe) {
            iframe.focus();
        }
    }

    document
        .querySelectorAll(".player-top a, .player-top button, .player-top [tabindex]")
        .forEach((el) => {
            el.setAttribute("tabindex", "-1");
            el.blur();
        });

    setTimeout(focusPlayer, 300);

    function buildPayload(eventName, currentTime, duration) {
        return {
            tmdb_id: tmdbId,
            event: eventName,
            progress_seconds: Math.floor(Number(currentTime) || 0),
            duration_seconds: Math.floor(Number(duration) || 0),
            content_type: isTv ? "tv" : "movie",
            season: season,
            episode: episode
        };
    }

    function sendProgress(eventName, currentTime, duration) {
        const payload = buildPayload(eventName, currentTime, duration);

        fetch("/api/watch-progress", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload),
            keepalive: true
        }).catch(() => {});
    }

    function normalizePayload(raw) {
        if (!raw) return null;

        let payload = raw;

        if (typeof payload === "string") {
            try {
                payload = JSON.parse(payload);
            } catch (e) {
                return null;
            }
        }

        if (payload.type === "PLAYER_EVENT" && payload.data) {
            if (typeof payload.data === "string") {
                try {
                    payload = JSON.parse(payload.data);
                } catch (e) {
                    return null;
                }
            } else {
                payload = payload.data;
            }
        }

        if (payload && payload.event) {
            return {
                event: payload.event,
                currentTime: Number(payload.currentTime || 0),
                duration: Number(payload.duration || 0)
            };
        }

        return null;
    }

    function goToNextEpisode() {
        if (!isTv || season === null || episode === null) return;

        const nextEpisode = Number(episode) + 1;
        const nextUrl = `/player/tv/${tmdbId}/${season}/${nextEpisode}`;
        window.location.href = nextUrl;
    }

    document.addEventListener("keydown", function (event) {
        const blockedKeys = [
            "ArrowLeft",
            "ArrowRight",
            "ArrowUp",
            "ArrowDown",
            "Enter"
        ];

        if (blockedKeys.includes(event.key)) {
            event.preventDefault();
            event.stopPropagation();
            focusPlayer();
        }
    }, true);

    window.addEventListener("message", function (event) {
        if (event.origin !== providerOrigin) {
            return;
        }

        const data = normalizePayload(event.data);
        if (!data) {
            return;
        }

        const eventName = data.event;
        const currentTime = data.currentTime;
        const duration = data.duration;

        latestCurrentTime = currentTime;
        latestDuration = duration;

        if (!eventName) return;

        if (eventName === "timeupdate") {
            if (currentTime - lastSentTime >= 10) {
                lastSentTime = currentTime;
                sendProgress("timeupdate", currentTime, duration);
            }
        }

        if (eventName === "pause" || eventName === "seeked" || eventName === "play") {
            sendProgress(eventName, currentTime, duration);
        }

        if (eventName === "ended") {
            hasEnded = true;
            sendProgress("ended", currentTime, duration);

            if (isTv) {
                setTimeout(function () {
                    goToNextEpisode();
                }, 2500);
            }
        }
    });

    setInterval(function () {
        if (hasEnded) return;

        if (latestCurrentTime > 0) {
            if (latestCurrentTime - lastSentTime >= 5) {
                lastSentTime = latestCurrentTime;
                sendProgress("heartbeat", latestCurrentTime, latestDuration);
            }
        }
    }, 10000);

    window.addEventListener("beforeunload", function () {
        if (!hasEnded && latestCurrentTime > 0) {
            sendProgress("beforeunload", latestCurrentTime, latestDuration);
        }
    });

    document.addEventListener("visibilitychange", function () {
        if (document.hidden && !hasEnded && latestCurrentTime > 0) {
            sendProgress("visibilitychange", latestCurrentTime, latestDuration);
        }
    });
});
</script>
{% endblock %}
